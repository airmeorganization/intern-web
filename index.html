<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>intern. App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: sans-serif; }
    .app-screen { display: none; flex-direction: column; height: 100vh; background: white; }
    .active-screen { display: flex; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center">

<div id="app-container" class="w-full h-[100dvh] sm:max-w-md mx-auto relative bg-white overflow-hidden sm:shadow-2xl sm:rounded-[40px] sm:border-8 sm:border-gray-900">

  <!-- Splash Screen -->
  <div id="splash-screen" class="app-screen active-screen items-center justify-center bg-black text-white">
    <h1 class="text-4xl font-bold">intern.</h1>
  </div>

  <!-- Login Main -->
  <div id="login-screen" class="app-screen p-6 justify-center">
    <h2 class="text-2xl font-bold mb-8 text-center">Welcome to intern.</h2>
    <button onclick="navigateTo('email-login-screen')" class="w-full bg-black text-white rounded-xl py-3.5 mb-4">Continue with Email</button>
    <button onclick="navigateTo('aorg-login-screen')" class="w-full bg-gray-200 text-black rounded-xl py-3.5 mb-4">Magic Link (aorg.in)</button>
    <button onclick="alert('Google Auth pending...')" class="w-full border border-gray-300 text-black rounded-xl py-3.5">Continue with Google</button>
  </div>

  <!-- Email Login -->
  <div id="email-login-screen" class="app-screen p-6 pt-12">
    <button onclick="navigateTo('login-screen')" class="mb-6">← Back</button>
    <h2 class="text-2xl font-bold mb-6">Sign In</h2>
    <input type="email" id="login-email" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Email">
    <input type="password" id="login-password" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Password">
    <button id="login-btn" class="w-full bg-black text-white rounded-xl py-3.5 mb-4">Sign In</button>
    <div class="text-center">
      <span class="text-gray-500">Don't have an account?</span>
      <button onclick="navigateTo('create-account-screen')" class="font-bold underline">Sign up</button>
    </div>
  </div>

  <!-- Create Account -->
  <div id="create-account-screen" class="app-screen p-6 pt-12">
    <button onclick="navigateTo('email-login-screen')" class="mb-6">← Back</button>
    <h2 class="text-2xl font-bold mb-6">Sign Up</h2>
    <input type="email" id="signup-email" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Email">
    <input type="password" id="signup-password" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Password">
    <button id="signup-btn" class="w-full bg-black text-white rounded-xl py-3.5">Sign Up</button>
  </div>

  <!-- Magic Link Login -->
  <div id="aorg-login-screen" class="app-screen p-6 pt-12">
    <button onclick="navigateTo('login-screen')" class="mb-6">← Back</button>
    <h2 class="text-2xl font-bold mb-6">Magic Link Login</h2>
    <input type="email" id="magic-email" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Email (e.g. name@aorg.in)">
    <button id="magic-btn" class="w-full bg-black text-white rounded-xl py-3.5">Send OTP</button>
  </div>

  <!-- OTP Screen -->
  <div id="aorg-otp-screen" class="app-screen p-6 pt-12">
    <button onclick="navigateTo('aorg-login-screen')" class="mb-6">← Back</button>
    <h2 class="text-2xl font-bold mb-6">Enter OTP</h2>
    <input type="text" id="otp-input" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="123456">
    <button id="verify-otp-btn" class="w-full bg-black text-white rounded-xl py-3.5">Verify</button>
  </div>

  <!-- Create Profile -->
  <div id="create-profile-screen" class="app-screen p-6 pt-12 overflow-y-auto">
    <h2 class="text-2xl font-bold mb-6">Create Profile</h2>
    <input type="text" id="profile-name" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Full Name">
    <input type="text" id="profile-username" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Username (unique)">
    <p id="username-error" class="text-red-500 text-sm hidden mb-4">Username taken</p>
    <input type="text" id="profile-profession" class="w-full border rounded-xl px-4 py-3 mb-4" placeholder="Profession / Major">

    <label class="block mb-2 font-bold">Upload Resume (PDF/DOCX)</label>
    <input type="file" id="resume-upload" accept=".pdf,.docx" class="mb-6 block w-full text-sm">

    <button id="save-profile-btn" class="w-full bg-black text-white rounded-xl py-3.5">Save Profile</button>
  </div>

  <!-- Main App - Home / Feed -->
  <div id="home-screen" class="app-screen">
    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="font-bold text-xl">intern.</h2>
      <div class="flex gap-4">
        <button onclick="navigateTo('search-screen')">🔍</button>
        <button onclick="navigateTo('chat-list-screen')">💬</button>
        <button onclick="navigateTo('profile-screen')">👤</button>
      </div>
    </div>

    <div class="p-4 border-b bg-gray-50">
      <textarea id="new-post-content" class="w-full bg-transparent resize-none outline-none" placeholder="What's on your mind?"></textarea>
      <div class="flex justify-between items-center mt-2">
        <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="new-post-isjob"> Job Post</label>
        <button id="publish-btn" class="bg-black text-white px-4 py-1.5 rounded-full text-sm font-bold">Post</button>
      </div>
    </div>

    <div id="feed-container" class="flex-1 overflow-y-auto pb-20"></div>
  </div>
  
  <!-- Search Screen -->
  <div id="search-screen" class="app-screen">
    <div class="p-4 border-b flex items-center gap-4">
      <button onclick="navigateTo('home-screen')">←</button>
      <input type="text" class="w-full bg-gray-100 rounded-full px-4 py-2 outline-none" placeholder="Search...">
    </div>
    <div class="p-4">Search functionality coming soon...</div>
  </div>

  <!-- Chat List -->
  <div id="chat-list-screen" class="app-screen">
    <div class="p-4 border-b flex items-center gap-4">
      <button onclick="navigateTo('home-screen')">←</button>
      <h2 class="font-bold text-lg">Messages</h2>
    </div>
    <div id="chat-list-container" class="flex-1 overflow-y-auto"></div>
  </div>

  <!-- Chat Detail -->
  <div id="chat-detail-screen" class="app-screen">
    <div class="p-4 border-b flex items-center gap-4">
      <button onclick="navigateTo('chat-list-screen')">←</button>
      <h2 id="chat-detail-name" class="font-bold text-lg">User</h2>
    </div>
    <div id="chat-messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
    <div class="p-4 border-t flex gap-2">
      <input type="text" id="chat-input" class="flex-1 border rounded-full px-4 outline-none" placeholder="Message...">
      <button id="chat-send-btn" class="bg-black text-white rounded-full px-4 py-2 font-bold">Send</button>
    </div>
  </div>

  <!-- AI Chat -->
  <div id="ai-chat-screen" class="app-screen">
    <div class="p-4 border-b flex items-center gap-4">
      <button onclick="navigateTo('chat-list-screen')">←</button>
      <h2 class="font-bold text-lg">intern. AI</h2>
    </div>
    <div id="ai-messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col">
      <div class="bg-blue-100 text-black max-w-[70%] px-4 py-2 rounded-2xl rounded-bl-none self-start mb-2">
        Hi! I'm intern AI. How can I help with your career?
      </div>
    </div>
    <div class="p-4 border-t flex gap-2">
      <input type="text" id="ai-chat-input" class="flex-1 border rounded-full px-4 outline-none" placeholder="Ask AI...">
      <button id="ai-chat-send-btn" class="bg-black text-white rounded-full px-4 py-2 font-bold">Send</button>
    </div>
  </div>

  <!-- Profile Screen -->
  <div id="profile-screen" class="app-screen p-6">
    <div class="flex justify-between items-center mb-6">
      <button onclick="navigateTo('home-screen')">← Back</button>
      <button id="logout-btn" class="text-red-500 font-bold">Logout</button>
    </div>
    <h2 class="text-2xl font-bold">My Profile</h2>
    <div class="mt-4" id="profile-info-container">Loading...</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<script type="module">
  import { supabase } from './js/config.js';
  import * as auth from './js/auth.js';
  import * as data from './js/data.js';
  import * as chat from './js/chat.js';

  let currentUser = null;

  window.navigateTo = function(screenId) {
    document.querySelectorAll('.app-screen').forEach(el => el.classList.remove('active-screen'));
    document.getElementById(screenId).classList.add('active-screen');
  };

  async function initApp() {
    setTimeout(async () => {
      const { data: { session } } = await supabase.auth.getSession();
      const isValid = await auth.checkSessionExpiry();

      if (session && isValid) {
        currentUser = session.user;
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        if (profile) {
          navigateTo('home-screen');
          data.loadFeed();
        } else {
          navigateTo('create-profile-screen');
        }
      } else {
        navigateTo('login-screen');
      }
    }, 1500); // simulate splash
  }

  // Auth Bindings
  document.getElementById('login-btn').onclick = async () => {
    const e = document.getElementById('login-email').value;
    const p = document.getElementById('login-password').value;
    const { data: res, error } = await auth.loginWithEmail(e, p);
    if(error) alert(error.message);
    else window.location.reload();
  };

  document.getElementById('signup-btn').onclick = async () => {
    const e = document.getElementById('signup-email').value;
    const p = document.getElementById('signup-password').value;
    const { data: res, error } = await auth.signUpWithEmail(e, p);
    if(error) alert(error.message);
    else { alert('Sign up successful, please log in.'); navigateTo('email-login-screen'); }
  };

  // Magic Link
  let magicEmail = '';
  document.getElementById('magic-btn').onclick = async () => {
    magicEmail = document.getElementById('magic-email').value;
    const { error } = await auth.loginWithMagicLink(magicEmail);
    if(error) alert(error.message);
    else navigateTo('aorg-otp-screen');
  };

  document.getElementById('verify-otp-btn').onclick = async () => {
    const token = document.getElementById('otp-input').value;
    const { error } = await auth.verifyOtp(magicEmail, token);
    if(error) alert(error.message);
    else window.location.reload();
  };

  // Profile Creation
  const usernameInput = document.getElementById('profile-username');
  usernameInput.addEventListener('blur', async () => {
    const isAvail = await auth.checkUsernameAvailable(usernameInput.value);
    document.getElementById('username-error').style.display = isAvail ? 'none' : 'block';
  });

  document.getElementById('save-profile-btn').onclick = async () => {
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) return;
    
    const name = document.getElementById('profile-name').value;
    const uname = usernameInput.value;
    const prof = document.getElementById('profile-profession').value;
    const file = document.getElementById('resume-upload').files[0];

    if(!name || !uname) return alert('Name and username required');

    // Attempt local parse
    let keywords = [];
    if(file) {
      keywords = await data.parseResumeLocally(file) || [];
      console.log('Parsed keywords:', keywords);
    }

    const { error } = await auth.createProfile(user.id, name, uname, prof);
    if (error) alert(error.message);
    else window.location.reload();
  };

  // Logout
  document.getElementById('logout-btn').onclick = async () => {
    await auth.logout();
    window.location.reload();
  };

  // Posts
  document.getElementById('publish-btn').onclick = async () => {
    const content = document.getElementById('new-post-content').value;
    const isJob = document.getElementById('new-post-isjob').checked;
    if(!content || !currentUser) return;

    document.getElementById('publish-btn').disabled = true;
    const { error } = await data.publishPost(currentUser.id, content, isJob);
    document.getElementById('publish-btn').disabled = false;

    if (error) alert(error.message);
    else {
      document.getElementById('new-post-content').value = '';
      document.getElementById('new-post-isjob').checked = false;
    }
  };

  // Navigation intercepts
  const originalNavigateTo = window.navigateTo;
  window.navigateTo = async function(screenId) {
    originalNavigateTo(screenId);
    if (screenId === 'home-screen') data.loadFeed();
    if (screenId === 'chat-list-screen' && currentUser) chat.loadChatList(currentUser.id);
    if (screenId === 'profile-screen' && currentUser) {
      const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
      document.getElementById('profile-info-container').innerHTML = `
        <p><strong>Name:</strong> ${profile.full_name}</p>
        <p><strong>Username:</strong> @${profile.username}</p>
        <p><strong>Profession:</strong> ${profile.profession || 'N/A'}</p>
      `;
    }
  };

  // Chat Actions
  document.getElementById('chat-send-btn').onclick = () => {
    const val = document.getElementById('chat-input').value;
    chat.sendMessage(val);
    document.getElementById('chat-input').value = '';
  };

  document.getElementById('ai-chat-send-btn').onclick = () => {
    const val = document.getElementById('ai-chat-input').value;
    if(!val) return;
    chat.askGemini(val);
    document.getElementById('ai-chat-input').value = '';
  };

  initApp();
</script>

</body>
</html>
